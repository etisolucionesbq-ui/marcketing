[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[edge_functions]]
  path = "/admin"
  function = "admin-auth"

[[edge_functions]]
  path = "/admin/*"
  function = "admin-auth"

[[edge_functions]]
  path = "/.netlify/functions/content"
  function = "admin-auth"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
