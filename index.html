<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UP Gamer | Ofertas</title>
  <meta name="description" content="Tienda gamer con productos, ofertas y compra por WhatsApp.">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-main">
      <button class="icon-button" type="button" aria-label="Abrir menu">
        <span></span><span></span><span></span>
      </button>
      <a class="logo" href="/">
        <img id="logo-image" src="" alt="Logo" hidden>
        <span>UP</span>
        <small>Gamer</small>
      </a>
      <label class="search-box" aria-label="Buscar productos">
        <input id="search-input" type="search" placeholder="Buscar">
      </label>
      <button id="cart-open" class="cart-button" type="button" aria-label="Abrir carrito">
        <span class="cart-icon">Cart</span>
        <strong id="product-count">0</strong>
      </button>
    </div>
    <nav id="category-nav" class="category-nav" aria-label="Categorias"></nav>
  </header>

  <main>
    <section class="hero" aria-label="Carrusel principal">
      <div id="hero-track" class="hero-track"></div>
      <button id="hero-prev" class="hero-control hero-control-prev" type="button" aria-label="Banner anterior">&lt;</button>
      <button id="hero-next" class="hero-control hero-control-next" type="button" aria-label="Banner siguiente">&gt;</button>
      <div id="hero-dots" class="hero-dots" aria-label="Seleccionar banner"></div>
    </section>

    <section class="band-title">
      <button class="arrow-button" type="button" aria-label="Anterior">&lt;</button>
      <h2>Ofertas</h2>
      <button class="arrow-button" type="button" aria-label="Siguiente">&gt;</button>
    </section>

    <section id="catalogo" class="product-section">
      <div id="products-grid" class="products-grid"></div>
    </section>

    <section id="promo-grid" class="promo-grid" aria-label="Promociones"></section>

    <section class="band-title">
      <button class="arrow-button" type="button" aria-label="Anterior">&lt;</button>
      <h2>Nuevos Productos</h2>
      <button class="arrow-button" type="button" aria-label="Siguiente">&gt;</button>
    </section>

    <section class="product-section">
      <div id="new-products-grid" class="products-grid"></div>
    </section>
  </main>

  <div id="cart-backdrop" class="cart-backdrop" hidden></div>
  <aside id="cart-drawer" class="cart-drawer" aria-label="Carrito de compras" aria-hidden="true">
    <div class="cart-head">
      <div>
        <small>Tu pedido</small>
        <h2>Carrito</h2>
      </div>
      <button id="cart-close" class="close-cart" type="button" aria-label="Cerrar carrito">X</button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-summary">
      <div>
        <span>Total</span>
        <strong id="cart-total">$0</strong>
      </div>
      <a id="cart-whatsapp" class="checkout-button" href="#" target="_blank" rel="noopener">
        <span class="whatsapp-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32" focusable="false">
            <path d="M16 3.5A12.4 12.4 0 0 0 5.3 22.2L4 28l5.9-1.5A12.4 12.4 0 1 0 16 3.5Zm0 22.5c-2 0-3.9-.6-5.5-1.6l-.4-.2-3.5.9.9-3.4-.2-.4A10 10 0 1 1 16 26Zm5.7-7.5c-.3-.2-1.8-.9-2.1-1s-.5-.2-.7.2-.8 1-1 1.2-.4.2-.7.1a8.2 8.2 0 0 1-4.1-3.6c-.3-.5.3-.5.8-1.7.1-.2 0-.4 0-.6l-1-2.3c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.6.1-.9.4s-1.2 1.2-1.2 2.9 1.2 3.3 1.4 3.5a11.4 11.4 0 0 0 4.5 4 10.1 10.1 0 0 0 2.8 1c1.2.2 2.2.1 3-.2.9-.4 1.8-1.5 2-2.2.2-.8.2-1.4.2-1.6s-.3-.3-.6-.5Z"/>
          </svg>
        </span>
        Enviar por WhatsApp
      </a>
      <button id="cart-clear" class="clear-cart" type="button">Vaciar carrito</button>
    </div>
  </aside>

  <button id="whatsapp-float" class="whatsapp-float" type="button" aria-label="Abrir carrito">
    <span class="whatsapp-icon" aria-hidden="true">
      <svg viewBox="0 0 32 32" focusable="false">
        <path d="M16 3.5A12.4 12.4 0 0 0 5.3 22.2L4 28l5.9-1.5A12.4 12.4 0 1 0 16 3.5Zm0 22.5c-2 0-3.9-.6-5.5-1.6l-.4-.2-3.5.9.9-3.4-.2-.4A10 10 0 1 1 16 26Zm5.7-7.5c-.3-.2-1.8-.9-2.1-1s-.5-.2-.7.2-.8 1-1 1.2-.4.2-.7.1a8.2 8.2 0 0 1-4.1-3.6c-.3-.5.3-.5.8-1.7.1-.2 0-.4 0-.6l-1-2.3c-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.6.1-.9.4s-1.2 1.2-1.2 2.9 1.2 3.3 1.4 3.5a11.4 11.4 0 0 0 4.5 4 10.1 10.1 0 0 0 2.8 1c1.2.2 2.2.1 3-.2.9-.4 1.8-1.5 2-2.2.2-.8.2-1.4.2-1.6s-.3-.3-.6-.5Z"/>
      </svg>
    </span>
  </button>
  <script src="assets/js/main.js"></script>
</body>
</html>
